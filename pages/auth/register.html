<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="web sell shoe and shirt">
    <link rel="stylesheet" href="../../assets/css/assets.auth.css/register.css">
    <link rel="stylesheet" href="../../assets/css/global.css/global.css">
    <link rel="stylesheet" href="../../assets/css/layout.css/header.css">
    <link rel="stylesheet" href="../../assets/css/layout.css/main.css">
    <link rel="stylesheet" href="../../assets/css/layout.css/footer.css">
    <link rel="stylesheet" href="../../assets/css/product.css/product.css">
    <link rel="stylesheet" href="../../assets/css/assets.auth.css/main_css_of_login/main.auth.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"> 
    <script type="module" src="../../assets/js/layout/header.js"></script>
    <script type="module" src="../../assets/js/layout/footer.js"></script>
    <title>Fluw Shop - Register</title>
</head>
<body>
    <div class="container-fluid">
        <fluw-header base-path="../../"></fluw-header>
        <div class="Main-center">
            <div class="box-log center">
                <form action="../../index.html" onsubmit="return register()">
                    <div class="login"><h1>Đăng Ký</h1></div>
                    <div class="inputt name-users">
                        <div>
                            <input id="first-name" type="text" placeholder="Họ...">
                            <p id="thongbao1" style="color: red;"></p>
                        </div>
                        <div>
                            <input id="last-name" type="text" placeholder="Tên...">
                            <p id="thongbao2" style="color: red;"></p>
                        </div>
                    </div>
                    <div class="inputt name-users">
                        <div>
                            <input id="email" type="text" placeholder="Email cá nhân...">
                            <p id="thongbao3" style="color: red;"></p>
                        </div>
                        <div>
                            <input id="sdt" type="number" placeholder="Số điện thoại...">
                            <p id="thongbao4" style="color: red;"></p>
                        </div>
                    </div>
                    <div class="inputt-for-pass">
                        <input id= "pass" type="text" placeholder="Nhập mật khẩu...">
                        <span id = "eye" onclick="togglePassword()">👁</span>
                        <p id="thongbao5" style="color: red;"></p>
                    </div>
                    <div class="inputt tilte-aa login">
                        Bạn đã có tài khoản <a href="../../pages/auth/login.html">đăng nhập tại đây</a>
                    </div>
                    <button type="submit" class="Login-to-index">
                        Đăng Nhập
                    </button>
                    <div class="linkgg-linkfb">
                        <div>
                            <a href="#" class="linkgg">Google</a>
                        </div>
                        <div>
                            <a href="#" class="linkfb">Facebook</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <fluw-footer base-path="../../"></fluw-footer>
    </div>
    <script src="../../assets/js/assets.auth.js/register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
